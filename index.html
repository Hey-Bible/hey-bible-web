    <div class="content">
      <h1>Turn Scripture Into Shareable Art</h1>
      <!-- Carousel -->
      <div class="carousel">
        <button class="carousel-arrow carousel-arrow-left" aria-label="Previous slide">&larr;</button>
        <div class="carousel-container">
          <img src="./img/carousel-3.jpg" alt="John 13:34" class="carousel-slide active" />
          <img src="./img/carousel-2.jpg" alt="Luke 9:23" class="carousel-slide" />
          <img src="./img/carousel-5.jpg" alt="1 John 3:16" class="carousel-slide" />
          <img src="./img/carousel-1.jpg" alt="1 Corinthians 3:8-9" class="carousel-slide" />
          <img src="./img/carousel-4.jpg" alt="Acts 4:11" class="carousel-slide" />
        </div>
        <button class="carousel-arrow carousel-arrow-right" aria-label="Next slide">&rarr;</button>
        <div class="carousel-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
      <script>
        (function() {
          const slides = document.querySelectorAll('.carousel-slide');
          const dots = document.querySelectorAll('.dot');
          const prevBtn = document.querySelector('.carousel-arrow-left');
          const nextBtn = document.querySelector('.carousel-arrow-right');
          let current = 0;
          let interval;

          function showSlide(index) {
            slides.forEach((slide, i) => {
              slide.classList.toggle('active', i === index);
              dots[i].classList.toggle('active', i === index);
            });
            current = index;
          }

          function nextSlide() {
            showSlide((current + 1) % slides.length);
          }

          function prevSlide() {
            showSlide((current - 1 + slides.length) % slides.length);
          }

          function startAutoplay() {
            interval = setInterval(nextSlide, 5000);
          }

          function stopAutoplay() {
            clearInterval(interval);
          }

          nextBtn.addEventListener('click', () => { stopAutoplay(); nextSlide(); startAutoplay(); });
          prevBtn.addEventListener('click', () => { stopAutoplay(); prevSlide(); startAutoplay(); });
          dots.forEach((dot, i) => dot.addEventListener('click', () => { stopAutoplay(); showSlide(i); startAutoplay(); }));

          startAutoplay();
        })();
      </script>
      <p class="hero-subtitle">
        Search the Bible, save your favorite verses, add personal notes, and
        create beautiful, shareable images of scripture.
      </p>
